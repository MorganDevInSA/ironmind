version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      next:
        patterns:
          - 'next'
          - 'eslint-config-next'
      firebase:
        patterns:
          - 'firebase'
          - 'firebase-tools'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react*'
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
